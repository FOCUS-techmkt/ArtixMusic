  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: #07070B;
      color: #fff;
      font-family: 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }
    #root { width: 100vw; height: 100vh; }

    /* Reusable type tokens */
    .ff-display { font-family: 'Space Grotesk', system-ui, sans-serif; }
    .ff-serif { font-family: 'Instrument Serif', serif; }
    .ff-mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }

    /* Lucide-ish stroke icons via inline svg helper */
    .lucide { stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; fill: none; stroke: currentColor; }

    /* Custom scrollbar inside artboards */
    .scroll-thin::-webkit-scrollbar { width: 6px; height: 6px; }
    .scroll-thin::-webkit-scrollbar-track { background: transparent; }
    .scroll-thin::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }

    /* Marquee */
    @keyframes marquee {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    .marquee-track { animation: marquee 40s linear infinite; }

    /* Subtle pulse */
    @keyframes pulseDot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.2); }
    }
    .pulse-dot { animation: pulseDot 2s ease-in-out infinite; }

    /* Bar grow */
    @keyframes growUp {
      from { transform: scaleY(0); }
      to { transform: scaleY(1); }
    }
    .grow-up { transform-origin: bottom; animation: growUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

    /* Shimmer on iridescent text */
    @keyframes shimmer {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    .iridescent {
      background: linear-gradient(120deg, #E8DDFF 0%, #C084FC 30%, #C026D3 55%, #7C3AED 75%, #E8DDFF 100%);
      background-size: 200% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: shimmer 8s ease-in-out infinite;
    }

    /* Beat bars */
    @keyframes beat {
      0%, 100% { transform: scaleY(0.4); }
      50% { transform: scaleY(1); }
    }
    .beat-bar { animation: beat 0.9s ease-in-out infinite; transform-origin: center; }

    /* Grain overlay */
    .grain::after {
      content: '';
      position: absolute; inset: 0;
      pointer-events: none;
      opacity: 0.04;
      mix-blend-mode: overlay;
      background-image: url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHdpZHRoPScyMDAnIGhlaWdodD0nMjAwJz48ZmlsdGVyIGlkPSduJz48ZmVUdXJidWxlbmNlIHR5cGU9J2ZyYWN0YWxOb2lzZScgYmFzZUZyZXF1ZW5jeT0nMC45JyBudW1PY3RhdmVzPScyJy8+PC9maWx0ZXI+PHJlY3Qgd2lkdGg9JzIwMCcgaGVpZ2h0PScyMDAnIGZpbHRlcj0ndXJsKCNuKScvPjwvc3ZnPg==");
    }

    /* Hide scrollbar but keep scrollable for full pages */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
