<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRESSKIT.PRO — Demo Completo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Syne:wght@600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'Inter', sans-serif; overflow-x: hidden; transition: background .6s ease; }

/* ─── ARTIST SWITCHER (floating) ─────────────── */
.switcher {
  position: fixed; top: 1rem; left: 50%; transform: translateX(-50%);
  z-index: 1000; display: flex; align-items: center; gap: .4rem;
  padding: .4rem .6rem; border-radius: 999px;
  background: rgba(10,10,10,.85); backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,.1);
  box-shadow: 0 8px 32px rgba(0,0,0,.5);
}
.switcher-label { font-family: 'JetBrains Mono', monospace; font-size: .6rem; color: rgba(255,255,255,.3); letter-spacing: .15em; padding: 0 .4rem; white-space: nowrap; }
.switcher-btn {
  padding: .35rem .9rem; border-radius: 999px; border: none; cursor: pointer;
  font-family: 'Syne', sans-serif; font-weight: 700; font-size: .7rem; letter-spacing: .05em;
  background: transparent; color: rgba(255,255,255,.4);
  transition: all .25s;
}
.switcher-btn.active { color: #fff; }

/* ─── PRESSKIT PAGE ───────────────────────────── */
.presskit { min-height: 100vh; }

/* ─── SECTION: HERO ───────────────────────────── */
.hero {
  height: 100vh; position: relative; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}
.hero-bg {
  position: absolute; inset: -15%;
  background-size: cover; background-position: center;
  will-change: transform;
}
.hero-bg img { width: 100%; height: 100%; object-fit: cover; }
.hero-overlay { position: absolute; inset: 0; }
.hero-content {
  position: relative; z-index: 2;
  display: flex; flex-direction: column; align-items: center; text-align: center;
  padding: 2rem; max-width: 1000px;
}

/* Letter animation */
.hero-name {
  font-family: 'Syne', sans-serif; font-weight: 800; line-height: .9;
  letter-spacing: -.04em; overflow: visible;
  font-size: clamp(5rem, 14vw, 11rem);
}
.hero-name .letter {
  display: inline-block;
  opacity: 0; transform: translateY(60px) rotateX(-90deg);
  animation: letterIn .55s forwards cubic-bezier(.22,1,.36,1);
}
.hero-name .space { display: inline-block; width: .3em; }

@keyframes letterIn {
  to { opacity: 1; transform: translateY(0) rotateX(0); }
}

/* Tags */
.hero-tags { display: flex; flex-wrap: wrap; justify-content: center; gap: .5rem; margin-top: 1.5rem; }
.hero-tag {
  padding: .3rem 1rem; border-radius: 999px;
  font-family: 'JetBrains Mono', monospace; font-size: .65rem; letter-spacing: .12em;
  opacity: 0; transform: translateY(20px);
  animation: fadeUp .5s forwards ease-out;
}
@keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

.scroll-hint {
  position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column; align-items: center; gap: .35rem; z-index: 2;
  opacity: 0; animation: fadeUp .5s 2.2s forwards ease-out;
}
.scroll-hint span { font-family: 'JetBrains Mono', monospace; font-size: .6rem; letter-spacing: .2em; }
.scroll-line { width: 1px; height: 2.5rem; animation: scrollPulse 1.6s ease-in-out infinite; }
@keyframes scrollPulse { 0%,100%{transform:scaleY(1);opacity:1} 50%{transform:scaleY(.4);opacity:.3} }

/* Waveform */
canvas.waveform { position: absolute; bottom: 0; left: 0; width: 100%; height: 100px; pointer-events: none; z-index: 2; }

/* ─── SECTION: BIO ────────────────────────────── */
.section { padding: 6rem 2rem; }
.inner { max-width: 880px; margin: 0 auto; }
.section-eyebrow {
  font-family: 'JetBrains Mono', monospace; font-size: .65rem;
  letter-spacing: .2em; text-transform: uppercase; margin-bottom: .75rem;
}
.section-title {
  font-family: 'Syne', sans-serif; font-weight: 800;
  font-size: clamp(2.25rem, 5vw, 3.5rem); line-height: 1.05; margin-bottom: 2rem;
}
.bio-text { font-size: 1.05rem; line-height: 1.8; margin-bottom: 3rem; max-width: 680px; }

/* Stats */
.stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 1rem; margin-bottom: 3rem; }
.stat-card {
  padding: 1.5rem; border-radius: 1rem; text-align: center;
  transform: translateY(30px); opacity: 0; transition: all .6s ease;
}
.stat-card.visible { transform: translateY(0); opacity: 1; }
.stat-num { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 2.2rem; }
.stat-label { font-family: 'JetBrains Mono', monospace; font-size: .6rem; letter-spacing: .1em; text-transform: uppercase; margin-top: .3rem; }

/* Achievements */
.achievements { display: flex; flex-direction: column; gap: .75rem; }
.ach {
  display: flex; gap: 1rem; align-items: flex-start;
  padding: 1rem 1.25rem; border-radius: .875rem;
  transform: translateX(-30px); opacity: 0; transition: all .6s ease;
}
.ach.visible { transform: translateX(0); opacity: 1; }
.ach:hover { transform: translateX(6px) !important; }
.ach-num { font-family: 'JetBrains Mono', monospace; font-size: .65rem; margin-top: .1rem; min-width: 1.5rem; }
.ach-title { font-weight: 600; font-size: .95rem; }
.ach-desc { font-size: .82rem; margin-top: .2rem; }

/* ─── SECTION: MUSIC ──────────────────────────── */
.tracks { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; margin-top: 2rem; }
@media (max-width: 600px) { .tracks { grid-template-columns: 1fr; } }
.track {
  display: flex; align-items: center; gap: 1rem;
  padding: 1rem 1.25rem; border-radius: 1rem; cursor: pointer;
  position: relative; overflow: hidden;
  transform: translateY(20px); opacity: 0; transition: all .5s ease;
}
.track.visible { transform: translateY(0); opacity: 1; }
.track::before { content: ''; position: absolute; inset: 0; opacity: 0; transition: opacity .3s; }
.track:hover::before { opacity: 1; }
.track:hover { transform: scale(1.025) translateY(-2px) !important; }
.track-play {
  width: 2.5rem; height: 2.5rem; border-radius: .75rem; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: .9rem;
  transition: transform .2s;
}
.track:hover .track-play { transform: scale(1.15); }
.track-info .track-name { font-weight: 600; font-size: .9rem; }
.track-info .track-num { font-family: 'JetBrains Mono', monospace; font-size: .62rem; margin-top: .15rem; }

/* ─── SECTION: TIMELINE ───────────────────────── */
.timeline-wrap { position: relative; max-width: 700px; margin: 0 auto; }
.timeline-spine {
  position: absolute; left: 50%; top: 0; bottom: 0; width: 1px;
  transform: translateX(-50%);
}
.timeline-spine-fill { position: absolute; top: 0; left: 0; width: 100%; height: 0; transition: height 1.5s ease; }
.timeline-items { display: flex; flex-direction: column; gap: 2rem; position: relative; }
.tl-item { display: flex; align-items: center; gap: 1.5rem; }
.tl-item:nth-child(even) { flex-direction: row-reverse; }
.tl-item:nth-child(even) .tl-card { text-align: right; }
.tl-card {
  flex: 1; padding: 1rem 1.25rem; border-radius: 1rem;
  transform: translateX(-30px); opacity: 0; transition: all .6s ease;
}
.tl-item:nth-child(even) .tl-card { transform: translateX(30px); }
.tl-card.visible { transform: translateX(0) !important; opacity: 1; }
.tl-venue { font-weight: 700; font-size: .95rem; }
.tl-meta { font-family: 'JetBrains Mono', monospace; font-size: .62rem; margin-top: .25rem; }
.tl-dot {
  width: .75rem; height: .75rem; border-radius: 50%; flex-shrink: 0;
  transform: scale(0); transition: transform .4s cubic-bezier(.34,1.56,.64,1);
}
.tl-dot.visible { transform: scale(1); }
.tl-spacer { flex: 1; }

/* ─── SECTION: GALLERY ────────────────────────── */
.gallery-masonry { columns: 3; column-gap: .75rem; }
@media (max-width: 768px) { .gallery-masonry { columns: 2; } }
@media (max-width: 480px) { .gallery-masonry { columns: 1; } }
.gallery-item {
  break-inside: avoid; margin-bottom: .75rem;
  border-radius: .875rem; overflow: hidden; cursor: pointer;
  opacity: 0; transform: scale(.95); transition: opacity .5s ease, transform .5s ease;
}
.gallery-item.visible { opacity: 1; transform: scale(1); }
.gallery-item img {
  width: 100%; display: block;
  transition: transform .5s ease, filter .4s ease;
  filter: brightness(.8) saturate(.75);
}
.gallery-item:hover img { transform: scale(1.06); filter: brightness(1) saturate(1.1); }

/* ─── SECTION: CONTACT ────────────────────────── */
.contact-section { padding: 6rem 2rem; text-align: center; }
.contact-title {
  font-family: 'Syne', sans-serif; font-weight: 800;
  font-size: clamp(2.5rem, 6vw, 4.5rem); line-height: 1; margin-bottom: 1rem;
}
.contact-sub { font-size: 1rem; margin-bottom: 2.5rem; }
.email-btn {
  display: inline-flex; align-items: center; gap: .875rem;
  padding: 1rem 2rem; border-radius: 1rem; cursor: pointer;
  font-family: 'JetBrains Mono', monospace; font-size: .95rem;
  transition: all .25s; position: relative; overflow: hidden; margin-bottom: 2rem;
}
.email-btn::after { content: ''; position: absolute; inset: 0; background: rgba(255,255,255,.08); opacity: 0; transition: opacity .2s; }
.email-btn:hover::after { opacity: 1; }
.email-btn:hover { transform: scale(1.04); }
.copy-feedback { font-family: 'JetBrains Mono', monospace; font-size: .75rem; margin-top: .5rem; height: 1.2rem; transition: opacity .2s; }
.socials { display: flex; justify-content: center; gap: .75rem; flex-wrap: wrap; }
.social-link {
  display: flex; align-items: center; gap: .5rem;
  padding: .6rem 1.2rem; border-radius: .875rem;
  font-size: .8rem; text-decoration: none; transition: all .2s;
}
.social-link:hover { transform: translateY(-2px); }

/* ─── BOOKING CTA (fixed) ─────────────────────── */
.booking-cta {
  position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 50;
  padding: .75rem 1.5rem; border-radius: 999px;
  font-weight: 600; font-size: .875rem; cursor: pointer; color: #fff;
  animation: ctaGlow 2.5s ease-in-out infinite;
  transition: background .5s ease, box-shadow .5s ease;
}
@keyframes ctaGlow {
  0%,100% { box-shadow: 0 4px 20px var(--glow-color, rgba(192,38,211,.35)); }
  50%      { box-shadow: 0 4px 40px var(--glow-color, rgba(192,38,211,.6)); }
}
.booking-cta:hover { transform: scale(1.06); }

/* ─── SCROLL ANIMATIONS ───────────────────────── */
.reveal { opacity: 0; transform: translateY(32px); transition: opacity .65s ease, transform .65s ease; }
.reveal.visible { opacity: 1; transform: translateY(0); }
</style>

      { icon: '🟢', label: 'Spotify',    url: '#' },
      { icon: '📷', label: 'Instagram',  url: '#' },
      { icon: '▶',  label: 'YouTube',    url: '#' },
    ],
  },
]

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let current = 0
let waveRAF = null
let parallaxRAF = null
let observers = []

// ═══════════════════════════════════════════════
// LOAD ARTIST
// ═══════════════════════════════════════════════
function loadArtist(idx) {
  current = idx
  const a = ARTISTS[idx]

  // Switcher buttons
  document.querySelectorAll('.switcher-btn').forEach((b, i) => b.classList.toggle('active', i === idx))

  // Body / page colors
  document.body.style.background = a.bg
  document.body.style.color      = a.text

  // Apply CSS vars
  setCSSVar('--primary',   a.primary)
  setCSSVar('--secondary', a.secondary)
  setCSSVar('--bg',        a.bg)
  setCSSVar('--surface',   a.surface)
  setCSSVar('--text',      a.text)
  setCSSVar('--muted',     a.muted)
  setCSSVar('--border',    a.border)
  setCSSVar('--glow-color', hexAlpha(a.primary, .4))

  // Sections bg/surface
  document.getElementById('bioSection').style.background     = a.bg
  document.getElementById('musicSection').style.background   = a.surface
  document.getElementById('liveSection').style.background    = a.bg
  document.getElementById('gallerySection').style.background = a.surface
  document.getElementById('contactSection').style.background = a.bg

  // Eyebrows
  ;['bioEyebrow','musicEyebrow','liveEyebrow','galleryEyebrow','contactEyebrow'].forEach(id => {
    document.getElementById(id).style.color = a.primary
  })

  // HERO
  buildHero(a)

  // BIO
  document.getElementById('bioTitle').textContent = a.bioTitle
  document.getElementById('bioTitle').style.color = a.text
  document.getElementById('bioText').textContent  = a.bio
  document.getElementById('bioText').style.color  = a.muted
  buildStats(a)
  buildAchievements(a)

  // MUSIC
  buildTracks(a)

  // TIMELINE
  buildTimeline(a)

  // GALLERY
  buildGallery(a)

  // CONTACT
  document.getElementById('contactTitle').innerHTML = `Reserva a <span style="color:${a.primary}">${a.name}</span>`
  document.getElementById('contactSub').style.color = a.muted
  document.getElementById('emailText').textContent  = a.email
  document.getElementById('emailBtn').style.cssText = `border:1px solid ${a.primary};color:${a.text};background:${hexAlpha(a.primary,.1)};`
  buildSocials(a)

  // BOOKING CTA
  const cta = document.getElementById('bookingCta')
  cta.style.background = a.primary
  cta.style.setProperty('--glow-color', hexAlpha(a.primary, .4))

  // Waveform
  startWaveform(a.primary)

  // Parallax
  startParallax()

  // Reset and re-observe all scroll elements
  resetScrollAnimations()
  setTimeout(initScrollAnimations, 100)

  // Counter
  setTimeout(() => startCounters(a), 400)

  // Timeline fill
  setTimeout(() => {
    const fill = document.getElementById('timelineFill')
    if (fill) fill.style.height = '100%'
  }, 600)
}

// ─── Hero ────────────────────────────────────────
function buildHero(a) {
  // Photo
  const img = document.getElementById('heroImg')
  img.style.opacity = '0'
  img.src = a.photo
  img.onload = () => { img.style.transition = 'opacity .7s'; img.style.opacity = '1' }

  // Overlay gradient
  document.getElementById('heroOverlay').style.background =
    `linear-gradient(to bottom, rgba(0,0,0,.55) 0%, rgba(0,0,0,.15) 40%, ${a.bg} 100%)`

  // Name — letter by letter
  const nameEl = document.getElementById('heroName')
  nameEl.style.color = a.text
  nameEl.style.perspective = '600px'
  nameEl.innerHTML = ''
  ;[...a.name].forEach((ch, i) => {
    if (ch === ' ') {
      nameEl.insertAdjacentHTML('beforeend', '<span class="space"></span>')
    } else {
      const span = document.createElement('span')
      span.className = 'letter'
      span.textContent = ch
      span.style.animationDelay = `${.5 + i * .06}s`
      span.style.textShadow = `0 0 50px ${hexAlpha(a.primary,.7)}`
      nameEl.appendChild(span)
    }
  })

  // Tags
  const tagsEl = document.getElementById('heroTags')
  tagsEl.innerHTML = ''
  a.tags.forEach((tag, i) => {
    const span = document.createElement('span')
    span.className = 'hero-tag'
    span.textContent = tag
    span.style.cssText = `
      border: 1px solid ${a.primary};
      color: ${a.primary};
      background: ${hexAlpha(a.primary, .12)};
      animation-delay: ${1.2 + i * .12}s;
    `
    tagsEl.appendChild(span)
  })

  // Scroll hint
  document.getElementById('scrollHintColor').style.color = a.muted
  document.getElementById('scrollLine').style.background = a.primary
}

// ─── Stats ───────────────────────────────────────
function buildStats(a) {
  const grid = document.getElementById('statsGrid')
  grid.innerHTML = ''
  a.stats.forEach((s, i) => {
    const card = document.createElement('div')
    card.className = 'stat-card'
    card.setAttribute('data-num', s.num)
    card.style.cssText = `
      border: 1px solid ${a.border};
      background: ${a.surface};
      transition-delay: ${i * .12}s;
    `
    card.innerHTML = `
      <div class="stat-num" style="color:${a.primary}">${s.num}</div>
      <div class="stat-label" style="color:${a.muted}">${s.label}</div>
    `
    grid.appendChild(card)
  })
}

// ─── Achievements ────────────────────────────────
function buildAchievements(a) {
  const list = document.getElementById('achievementsList')
  list.innerHTML = ''
  a.achievements.forEach((ach, i) => {
    const el = document.createElement('div')
    el.className = 'ach'
    el.style.cssText = `
      border: 1px solid ${a.border};
      background: ${hexAlpha(a.surface, .6)};
      transition-delay: ${i * .1}s;
    `
    el.innerHTML = `
      <span class="ach-num" style="color:${a.primary}">${String(i+1).padStart(2,'0')}</span>
      <div>
        <div class="ach-title" style="color:${a.text}">${ach.title}</div>
        <div class="ach-desc" style="color:${a.muted}">${ach.desc}</div>
      </div>
    `
    list.appendChild(el)
  })
}

// ─── Tracks ──────────────────────────────────────
function buildTracks(a) {
  const list = document.getElementById('tracksList')
  list.innerHTML = ''
  a.tracks.forEach((t, i) => {
    const el = document.createElement('div')
    el.className = 'track'
    el.style.cssText = `
      border: 1px solid ${a.border};
      background: ${a.surface};
      transition-delay: ${i * .08}s;
    `
    el.innerHTML = `
      <style>.track:hover::before { background: radial-gradient(ellipse at center, ${hexAlpha(a.primary,.08)}, transparent 70%); }</style>
      <div class="track-play" style="background:${hexAlpha(a.primary,.18)};color:${a.primary}">▶</div>
      <div class="track-info">
        <div class="track-name" style="color:${a.text}">${a.name} — ${t}</div>
        <div class="track-num" style="color:${a.muted}">TRACK ${String(i+1).padStart(2,'0')}</div>
      </div>
    `
    list.appendChild(el)
  })
}

// ─── Timeline ────────────────────────────────────
function buildTimeline(a) {
  document.getElementById('timelineBg').style.background = a.border
  const fill = document.getElementById('timelineFill')
  fill.style.background = a.primary
  fill.style.height = '0'

  const items = document.getElementById('timelineItems')
  items.innerHTML = ''
  a.events.forEach((ev, i) => {
    const el = document.createElement('div')
    el.className = 'tl-item'
    el.innerHTML = `
      <div class="tl-card" style="border:1px solid ${a.border};background:${hexAlpha(a.surface,.8)};transition-delay:${i*.1}s">
        <div class="tl-venue" style="color:${a.text}">${ev.venue}</div>
        <div class="tl-meta" style="color:${a.muted}">${ev.meta}</div>
      </div>
      <div class="tl-dot" style="background:${a.primary};box-shadow:0 0 8px ${hexAlpha(a.primary,.7)};transition-delay:${i*.1+.15}s"></div>
      <div class="tl-spacer"></div>
    `
    items.appendChild(el)
  })
}

// ─── Gallery ─────────────────────────────────────
function buildGallery(a) {
  const grid = document.getElementById('galleryGrid')
  grid.innerHTML = ''
  a.gallery.forEach((url, i) => {
    const el = document.createElement('div')
    el.className = 'gallery-item'
    el.style.transitionDelay = `${(i%3) * .1}s`
    el.innerHTML = `<img src="${url}" alt="" loading="lazy">`
    grid.appendChild(el)
  })
}

// ─── Socials ─────────────────────────────────────
function buildSocials(a) {
  const el = document.getElementById('socialLinks')
  el.innerHTML = ''
  a.socials.forEach(s => {
    const link = document.createElement('a')
    link.className = 'social-link'
    link.href = s.url
    link.style.cssText = `
      border: 1px solid ${a.border};
      color: ${a.muted};
      background: ${a.surface};
    `
    link.innerHTML = `${s.icon} ${s.label}`
    link.addEventListener('mouseenter', () => { link.style.borderColor = a.primary; link.style.color = a.primary })
    link.addEventListener('mouseleave', () => { link.style.borderColor = a.border;  link.style.color = a.muted })
    el.appendChild(link)
  })
}

// ═══════════════════════════════════════════════
// WAVEFORM
// ═══════════════════════════════════════════════
function startWaveform(accentColor) {
  if (waveRAF) cancelAnimationFrame(waveRAF)
  const canvas = document.getElementById('waveCanvas')
  const ctx = canvas.getContext('2d')
  let t = 0

  const resize = () => {
    canvas.width  = canvas.offsetWidth  * devicePixelRatio
    canvas.height = canvas.offsetHeight * devicePixelRatio
    ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0)
  }
  resize()
  window.addEventListener('resize', resize)

  const draw = () => {
    const w = canvas.offsetWidth, h = canvas.offsetHeight
    ctx.clearRect(0, 0, w, h)
    const g = ctx.createLinearGradient(0, 0, w, 0)
    g.addColorStop(0, 'transparent')
    g.addColorStop(.25, accentColor + '90')
    g.addColorStop(.75, accentColor + '90')
    g.addColorStop(1, 'transparent')
    ctx.strokeStyle = g; ctx.lineWidth = 1.5
    ctx.beginPath()
    for (let i = 0; i <= 100; i++) {
      const x = i*(w/100)
      const y = h/2 + Math.sin(i*.22+t)*24 + Math.sin(i*.38+t*1.3+1)*15 + Math.sin(i*.1+t*.7)*9
      i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y)
    }
    ctx.stroke()
    t += .016
    waveRAF = requestAnimationFrame(draw)
  }
  draw()
}

// ═══════════════════════════════════════════════
// PARALLAX
// ═══════════════════════════════════════════════
function startParallax() {
  if (parallaxRAF) cancelAnimationFrame(parallaxRAF)
  let ticking = false
  const bg = document.getElementById('heroBg')
  const onScroll = () => {
    if (!ticking) {
      requestAnimationFrame(() => {
        if (bg) bg.style.transform = `translateY(${window.scrollY * .35}px)`
        ticking = false
      })
      ticking = true
    }
  }
  window.addEventListener('scroll', onScroll, { passive: true })
}

// ═══════════════════════════════════════════════
// SCROLL ANIMATIONS
// ═══════════════════════════════════════════════
function resetScrollAnimations() {
  observers.forEach(o => o.disconnect())
  observers = []
  document.querySelectorAll('.reveal, .stat-card, .ach, .track, .tl-card, .tl-dot, .gallery-item').forEach(el => {
    el.classList.remove('visible')
  })
}

function initScrollAnimations() {
  const all = [
    { selector: '.reveal',       threshold: .15 },
    { selector: '.stat-card',    threshold: .2 },
    { selector: '.ach',          threshold: .2 },
    { selector: '.track',        threshold: .15 },
    { selector: '.tl-card',      threshold: .25 },
    { selector: '.tl-dot',       threshold: .25 },
    { selector: '.gallery-item', threshold: .1 },
  ]

  all.forEach(({ selector, threshold }) => {
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target) } })
    }, { threshold })
    document.querySelectorAll(selector).forEach(el => obs.observe(el))
    observers.push(obs)
  })

  // Timeline fill on scroll
  const tlObs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        document.getElementById('timelineFill').style.height = '100%'
        tlObs.unobserve(e.target)
      }
    })
  }, { threshold: .1 })
  const tlSection = document.getElementById('liveSection')
  if (tlSection) { tlObs.observe(tlSection); observers.push(tlObs) }
}

// ═══════════════════════════════════════════════
// COUNTER ANIMATION
// ═══════════════════════════════════════════════
function startCounters(a) {
  a.stats.forEach((s, i) => {
    // Extract number from strings like "20M", "142K", "48+"
    const raw    = s.num.replace(/[^0-9.]/g, '')
    const suffix = s.num.replace(/[0-9.]/g, '')
    const target = parseFloat(raw)
    const dur    = 2000
    const t0     = Date.now()
    const ease   = t => 1 - Math.pow(1 - t, 4)
    const el     = document.querySelectorAll('.stat-num')[i]
    if (!el) return

    const tick = () => {
      const p   = Math.min((Date.now()-t0)/dur, 1)
      const val = target * ease(p)
      el.textContent = (val % 1 === 0 || p >= 1) ? Math.round(val) + suffix : val.toFixed(1) + suffix
      if (p < 1) requestAnimationFrame(tick)
      else el.textContent = s.num
    }
    tick()
  })
}

// ═══════════════════════════════════════════════
// COPY EMAIL
// ═══════════════════════════════════════════════
function copyEmail() {
  const email = document.getElementById('emailText').textContent
  navigator.clipboard.writeText(email).then(() => {
    const icon     = document.getElementById('copyIcon')
    const feedback = document.getElementById('copyFeedback')
    const a        = ARTISTS[current]
    icon.textContent = '✓'
    icon.style.color = a.primary
    feedback.textContent = '✓ Email copiado al portapapeles'
    feedback.style.color  = a.primary
    feedback.style.opacity = '1'
    setTimeout(() => {
      icon.textContent = 'copiar'; icon.style.color = ''
      feedback.style.opacity = '0'
    }, 2500)
  })
}

// ═══════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════
function setCSSVar(name, value) { document.documentElement.style.setProperty(name, value) }
function hexAlpha(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16)
  return `rgba(${r},${g},${b},${alpha})`
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => loadArtist(0))
</script>
